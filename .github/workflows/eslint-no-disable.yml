name: eslint-no-disable
on:
  pull_request:
  push:

jobs:
  no-disable:
    name: ESLint no-new-disables (AC-3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run no-disable check
        run: scripts/eslint-no-disable.sh origin/main
