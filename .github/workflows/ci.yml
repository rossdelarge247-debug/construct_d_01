name: CI

# Runs on every PR + push to main.
# Source of truth for the CI gates listed in docs/workspace-spec/71-rebuild-strategy.md §7 Phase C.0
# and docs/workspace-spec/72-engineering-security.md §2 + §7.
#
# Jobs:
#   - lint              — eslint
#   - typecheck         — tsc --noEmit
#   - test              — vitest run
#   - build             — next build (with NEXT_PUBLIC_DECOUPLE_AUTH_MODE=prod)
#   - env-var-regex-ban — fails if any NEXT_PUBLIC_*_SECRET|_TOKEN|_PASSWORD|_PRIVATE
#                         appears in the repo (spec 72 §2 hard rule 2, narrowed session 24
#                         to exclude _KEY which catches legit public keys)
#   - dev-mode-leak     — post-build grep for @dev.decouple.local and decouple:dev:*
#                         in .next bundle (spec 72 §7). Narrowed session 24 to avoid
#                         false positives from minified module paths.
#   - npm-audit         — fails on high + critical (spec 72 §10 pre-pen-test audit)
#
# Not yet wired here (require S-F7 or later code + Playwright):
#   - /dev/* returns 404 in prod build integration test (spec 72 §7)
#   - Security-headers scan against preview deploy (spec 72 §10)
#   - CSP-violation console check (spec 72 §10)

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  test:
    name: Unit + logic tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    name: Production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Next.js production build
        env:
          # Spec 71 §4 + spec 72 §7: production build requires prod mode.
          # Once S-F7 ships, lib/auth/index.ts throws at module-load if this
          # env var is not 'prod' under NODE_ENV=production.
          NEXT_PUBLIC_DECOUPLE_AUTH_MODE: prod
        run: npm run build
      - name: Upload build artefact for dev-mode-leak scan
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next
          retention-days: 1
          # upload-artifact@v4 excludes dotfiles by default; .next is a
          # dot-prefixed dir so every file under it is treated as hidden
          # and skipped. Without this flag the artifact is empty and
          # dev-mode-leak fails with "Artifact not found".
          include-hidden-files: true

  env-var-regex-ban:
    name: Env-var regex ban (spec 72 §2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for banned NEXT_PUBLIC_* secret-like names
        run: |
          set -euo pipefail
          # Spec 72 §2 hard rule 2 (narrowed post-session-24): NEXT_PUBLIC_*_(SECRET|TOKEN|PASSWORD|PRIVATE) banned.
          # _KEY was in the original rule text but caught legitimate public keys
          # (NEXT_PUBLIC_SUPABASE_ANON_KEY, NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY, NEXT_PUBLIC_POSTHOG_KEY —
          # all designed-to-be-public per spec 72 §2 inventory table). Narrowed to unambiguously secret suffixes.
          # Checks: source files + env templates + workflow files (excludes lockfiles + .git + node_modules + .next).
          PATTERN='NEXT_PUBLIC_[A-Z0-9_]*(_SECRET|_TOKEN|_PASSWORD|_PRIVATE)\b'
          MATCHES=$(grep -rEn \
            --exclude-dir=node_modules \
            --exclude-dir=.git \
            --exclude-dir=.next \
            --exclude=package-lock.json \
            --exclude=.gitleaks.toml \
            --exclude-dir=.github/workflows \
            "$PATTERN" . || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Banned NEXT_PUBLIC_*_(SECRET|TOKEN|PASSWORD|PRIVATE) pattern found."
            echo "$MATCHES"
            echo ""
            echo "Fix: these names ship in the client bundle. Use the server-only form (no NEXT_PUBLIC_ prefix)."
            echo "See docs/workspace-spec/72-engineering-security.md §2 hard rule 2."
            exit 1
          fi
          echo "No banned env-var patterns found."

  dev-mode-leak:
    name: Dev-mode leak scan (spec 72 §7)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download build artefact
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next
      - name: Scan production build for dev-mode references
        run: |
          set -euo pipefail
          # Spec 72 §7 prod-bundle check — NARROWED post-session-24.
          # We scan for two very-specific S-F7 runtime strings only:
          #   1. @dev.decouple.local — fixture email domain (spec 72 §7 "fixture data isolation")
          #   2. decouple:dev: — dev localStorage key prefix (spec 71 §4)
          # Both are S-F7-exclusive + unambiguous. Neither should ever appear in the prod bundle.
          #
          # Previously we also grepped for `dev-session|dev-store|dev-auth-gate` and a list of
          # scenario IDs — but those matched false positives in minified webpack module paths
          # and Next.js internals. The spec-72-§7 items 3 (no imports from dev-only modules)
          # and 4 (/dev/* returns 404) are enforced by: ESLint rule (future) + Playwright test
          # (once S-F7 lands), not by bundle grep.
          FAIL=0

          if grep -rEn '@dev\.decouple\.local' .next 2>/dev/null; then
            echo "::error::Production build contains @dev.decouple.local fixture email references."
            FAIL=1
          fi

          if grep -rEn 'decouple:dev:' .next 2>/dev/null; then
            echo "::error::Production build contains decouple:dev:* localStorage key references."
            FAIL=1
          fi

          if [ "$FAIL" -eq 1 ]; then
            echo ""
            echo "See docs/workspace-spec/72-engineering-security.md §7 for dev/prod boundary rules."
            exit 1
          fi
          echo "No dev-mode leaks in production build."

  npm-audit:
    name: npm audit (high + critical)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Audit production dependencies
        run: |
          set -euo pipefail
          # Spec 72 §10: fail on high + critical. Medium is advisory.
          npm audit --omit=dev --audit-level=high
